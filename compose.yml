services:
  postgres:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: catalog-postgres
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catalog"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: